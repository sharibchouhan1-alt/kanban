<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Responsive Quiz</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        /* Ensures the option container retains layout sizing structure across different text rows */
        .quiz-btn {
            min-height: 72px; 
            white-space: normal;
            word-break: break-word;
        }
    </style>
</head>
<body class="bg-light text-dark min-vh-100 d-flex flex-column">

    <header class="bg-white shadow-sm py-3 py-md-4">
        <div class="container d-flex flex-column flex-sm-row justify-content-between align-items-sm-center gap-3">
            <h1 class="h3 mb-0 fs-5 fw-bold text-uppercase tracking-wider text-primary text-center text-sm-start" id="hed">
                QUIZ_TEST-BOOSTER
            </h1>
            <div class="w-100" style="max-width: 320px;">
                <div class="text-muted small fw-bold mb-2 text-center text-sm-start" id="prgsbar">PROGRESS: 0 / 7 | CORRECT: 0</div>
                <div class="progress" style="height: 10px;">
                    <div class="progress-bar bg-primary transition-all" 
                         role="progressbar" 
                         id="bar"
                         style="width: 0%;" 
                         aria-valuenow="0" 
                         aria-valuemin="0" 
                         aria-valuemax="100">
                    </div>
                </div>
            </div>
        </div>
    </header>

    <main class="flex-grow-1 d-flex align-items-center py-4 py-md-5"> 
        <div class="container">
            <div class="row justify-content-center">
                
                <div class="col-12 col-md-10 col-lg-9" style="max-width: 850px;">
                    
                    <div class="p-4 p-md-5 bg-white rounded-4 shadow-sm border">
                        
                        <h2 class="fw-bold text-dark lh-base mb-4 fs-5 fs-md-4" id="ques">
                            Which of the <span class="fst-italic">following</span> is the correct syntax for a JavaScript Rest Parameter?
                        </h2>

                        <div class="row g-3 mb-4" id="answ">
                            <div class="col-12 col-sm-6 d-flex flex-column">
                                <button type="button" class="btn btn-outline-secondary quiz-btn w-100 py-3 rounded-pill text-start px-4 shadow-sm fw-medium d-flex align-items-center h-100" id="btn1">
                                    <span id="opt1">myFunc(x, y)............</span> 
                                </button>
                            </div>
                            <div class="col-12 col-sm-6 d-flex flex-column">
                                <button type="button" class="btn btn-outline-secondary quiz-btn w-100 py-3 rounded-pill text-start px-4 shadow-sm fw-medium d-flex align-items-center h-100" id="btn2">
                                    <span id="opt2">function myFunc(...args)</span>
                                </button>
                            </div>
                            <div class="col-12 col-sm-6 d-flex flex-column">
                                <button type="button" class="btn btn-outline-secondary quiz-btn w-100 py-3 rounded-pill text-start px-4 shadow-sm fw-medium d-flex align-items-center h-100" id="btn3">
                                    <span id="opt3">function myFunc(args...)</span>
                                </button>
                            </div>
                            <div class="col-12 col-sm-6 d-flex flex-column">
                                <button type="button" class="btn btn-outline-secondary quiz-btn w-100 py-3 rounded-pill text-start px-4 shadow-sm fw-medium d-flex align-items-center h-100" id="btn4">
                                    <span id="opt4">function myFunc(args...)</span>
                                </button>
                            </div>
                        </div> 
                        
                        <hr class="text-muted opacity-25 my-4">

                        <div class="d-flex flex-column flex-sm-row justify-content-between align-items-center gap-3">
                            <div class="text-success fw-semibold fs-6" id="feedback">
                                <span class="fw-bold text-uppercase">Feedback:</span> <span id="fdbk" style="color: gray;">Waiting!</span>
                            </div>
                            <button type="button" class="btn btn-dark fw-bold px-4 py-2.5 rounded-3 shadow-sm text-uppercase tracking-wider fs-6 w-100 w-sm-auto" id="btn">
                                Next Question <i class="bi bi-arrow-right ms-1"></i>
                            </button>
                        </div>

                    </div> 
                </div>
                
            </div>
        </div>
    </main>

    <footer class="bg-dark text-white-50 py-3 text-center fs-7">
        <div class="container">
            <small>&copy; 2026 Your Name</small>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="index.js" defer></script>
</body>
</html>
