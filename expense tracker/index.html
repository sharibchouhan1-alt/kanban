<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Finance Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        /* Extra custom styling to match the modern dashboard feel */
        .card-dash {
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .card-dash:hover {
            transform: translateY(-2px);
            box-shadow: 0 .5rem 1rem rgba(0,0,0,.08)!important;
        }
    </style>
</head>
<body class="bg-light text-dark min-vh-100 d-flex flex-column">

    <header class="bg-white shadow-sm py-3 mb-4 mb-md-5">
        <div class="container d-flex flex-column flex-sm-row justify-content-between align-items-center gap-2">
            <h1 class="h4 fw-bold mb-0 text-dark tracking-wide text-uppercase">
                Dashboard
            </h1>
            <span class="text-muted small fw-medium" id="sync-status">
                All data synced and saved.
            </span>
        </div>
    </header>

    <main class="flex-grow-1 py-2">
        <div class="container" style="max-width: 950px;">
            
            <div class="row g-3 mb-4 mb-md-5">
                <div class="col-12 col-md-4">
                    <div class="card card-dash bg-white border rounded-4 shadow-sm p-3 h-100 d-flex flex-row align-items-center gap-3">
                        <div class="bg-success-subtle text-success rounded-circle d-flex align-items-center justify-content-center" style="width: 50px; height: 50px;">
                            <i class="bi bi-arrow-up-right fs-4"></i>
                        </div>
                        <div>
                            <div class="text-muted small text-uppercase fw-bold tracking-wider" style="font-size: 0.75rem;">Total Income</div>
                            <div class="h4 fw-black text-success mb-0" id="total-income">₹0.00</div>
                        </div>
                    </div>
                </div>

                <div class="col-12 col-md-4">
                    <div class="card card-dash bg-white border rounded-4 shadow-sm p-3 h-100 d-flex flex-row align-items-center gap-3">
                        <div class="bg-danger-subtle text-danger rounded-circle d-flex align-items-center justify-content-center" style="width: 50px; height: 50px;">
                            <i class="bi bi-arrow-down-left fs-4"></i>
                        </div>
                        <div>
                            <div class="text-muted small text-uppercase fw-bold tracking-wider" style="font-size: 0.75rem;">Total Expenses</div>
                            <div class="h4 fw-black text-danger mb-0" id="total-expenses">₹0.00</div>
                        </div>
                    </div>
                </div>

                <div class="col-12 col-md-4">
                    <div class="card card-dash bg-white border rounded-4 shadow-sm p-3 h-100 d-flex flex-row align-items-center gap-3">
                        <div class="bg-primary-subtle text-primary rounded-circle d-flex align-items-center justify-content-center" style="width: 50px; height: 50px;">
                            <i class="bi bi-wallet2 fs-4"></i>
                        </div>
                        <div>
                            <div class="text-muted small text-uppercase fw-bold tracking-wider" style="font-size: 0.75rem;">Current Balance</div>
                            <div class="h4 fw-black text-dark mb-0" id="current-balance">₹0.00</div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card bg-white rounded-4 shadow-sm border p-4 p-md-5 mb-4 mb-md-5">
                <h2 class="h5 fw-bold text-dark mb-4">Add New Transaction</h2>
                
                <form id="transaction-form">
                    <div class="row g-3 mb-4">
                        <div class="col-12 col-md-5">
                            <label for="desc" class="form-label text-muted small fw-bold">Description (e.g., Salary, Groceries)</label>
                            <input type="text" class="form-control form-control-lg fs-6 rounded-3" id="desc" placeholder="What was this for?" required>
                        </div>
                        <div class="col-12 col-sm-6 col-md-3">
                            <label for="amount" class="form-label text-muted small fw-bold">Amount ($)</label>
                            <input type="number" step="0.01" class="form-control form-control-lg fs-6 rounded-3" id="amount" placeholder="0.00" required min="0.01">
                        </div>
                        <div class="col-12 col-sm-6 col-md-4">
                            <label for="category" class="form-label text-muted small fw-bold">Category (Type)</label>
                            <select class="form-select form-control-lg fs-6 rounded-3" id="category" required>
                                <option value="" disabled selected>Choose Type...</option>
                                <option value="income">Income</option>
                                <option value="expense">Expense</option>
                            </select>
                        </div>
                    </div>

                    <div class="row g-3" id="prntbtn">
                        <div class="col-12 col-sm-6">
                            <button type="button" id="btn-income" class="btn btn-success btn-lg w-100 py-2.5 rounded-3 fw-bold fs-6 shadow-sm text-uppercase tracking-wider" disabled>
                                <i class="bi bi-plus-circle me-1"></i> Save Income
                            </button>
                        </div>
                        <div class="col-12 col-sm-6">
                            <button type="button" id="btn-expense" class="btn btn-danger btn-lg w-100 py-2.5 rounded-3 fw-bold fs-6 shadow-sm text-uppercase tracking-wider" disabled>
                                <i class="bi bi-dash-circle me-1"></i> Save Expense
                            </button>
                        </div>
                    </div>
                </form>
            </div>

            <div class="card bg-white rounded-4 shadow-sm border p-4 p-md-5 mb-5">
                <h2 class="h5 fw-bold text-dark mb-4">Recent Transactions</h2>
                
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0 ">
                        <thead class="table-light text-muted small uppercase fw-bold">
                            <tr>
                                <th scope="col" class="py-3 ps-3">Description</th>
                                <th scope="col" class="py-3">Type</th>
                                <th scope="col" class="py-3">Amount</th>
                                <th scope="col" class="py-3 text-end pe-3">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="transaction-list">
                            </tbody>
                    </table>
                </div>

                <div id="no-data-alert" class="text-center py-5 text-muted d-none">
                    <i class="bi bi-clipboard2-x fs-1 opacity-50 mb-2 d-block"></i>
                    No recorded transactions found. Fill out the form above to get started!
                </div>
            </div>

        </div>
    </main>

    <footer class="bg-white border-top py-3 text-center fs-7 text-muted">
        <div class="container">
            <small>&copy; 2026 ExpenseTracker Application Dashboard</small>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
<script src="index.js"></script>
</html>
